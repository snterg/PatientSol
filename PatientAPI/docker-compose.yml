version: '3.8'

services:
  # Контейнер с SQL Server
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: patient_db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "y339x3merqyw8xgl0lrm1dyvfhez3cf!"
      MSSQL_PID: "Express"
      # Настройка временной зоны для SQL Server (GMT+3 / Москва)
      TZ: "Europe/Moscow"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      # Монтируем файл времени для корректной настройки (для Linux)
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - patient_network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "y339x3merqyw8xgl0lrm1dyvfhez3cf!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Контейнер с вашим Web API
  patientapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: patient_api
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=db;Database=PatientDb;User Id=sa;Password=y339x3merqyw8xgl0lrm1dyvfhez3cf!;TrustServerCertificate=True;
      # Настройка временной зоны для API контейнера (GMT+3)
      - TZ=Europe/Moscow
      # Альтернативный способ для .NET (переопределение временной зоны)
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
    volumes:
      # Монтируем файлы времени для корректной настройки
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - patient_network

# Определяем сеть для связи контейнеров
networks:
  patient_network:
    driver: bridge

# Том для хранения данных БД
volumes:
  sql_data: